name: time_capsule_flutter
description: TimeCapsule - Send messages to the future
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP & Storage
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.6.2

  # Media
  image_picker: ^1.1.2
  just_audio: ^0.9.41

  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Realtime
  supabase_flutter: ^2.9.1
  flutter_local_notifications: ^18.0.1

  # Push Notifications
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  path_provider: ^2.1.4

  # Social Login
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1

  # Audio recording
  flutter_sound: ^9.5.2
  flutter_sound_platform_interface: ^9.5.2

  # Location
  geolocator: ^13.0.2

  # Utils
  intl: ^0.20.1
  share_plus: ^10.1.3
  permission_handler: ^11.3.1
  mime: ^2.0.0
  http: ^1.2.2
  local_auth: ^3.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
